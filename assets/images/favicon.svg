<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f39c12" />
      <stop offset="100%" stop-color="#e67e22" />
    </linearGradient>
  </defs>
  <!-- Rounded container background representing our dark theme -->
  <rect width="100%" height="100%" rx="24" fill="#17110d" />
  
  <!-- Rising hot steam / aroma lines representing 'Live baked' & 'Puffing' -->
  <path d="M40 32 Q45 22 40 12" stroke="#f39c12" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M50 28 Q55 18 50 8" stroke="#f39c12" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M60 32 Q65 22 60 12" stroke="#f39c12" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
  
  <!-- The golden-brown puff pastry -->
  <path d="M25 45 C20 45 15 50 15 55 L15 75 C15 80 20 85 25 85 L75 85 C80 85 85 80 85 75 L85 55 C85 50 80 45 75 45 Z" fill="url(#goldGrad)" />
  
  <!-- Flaky crust separation highlight -->
  <path d="M25 48 H75 C77 48 79 50 79 52 V58 H21 V52 C21 50 23 48 25 48 Z" fill="#f1c40f" opacity="0.9" />
  
  <!-- Scorings/slits on puff surface -->
  <line x1="35" y1="56" x2="45" y2="76" stroke="#7e3d11" stroke-width="4.5" stroke-linecap="round" />
  <line x1="50" y1="56" x2="60" y2="76" stroke="#7e3d11" stroke-width="4.5" stroke-linecap="round" />
  <line x1="65" y1="56" x2="75" y2="76" stroke="#7e3d11" stroke-width="4.5" stroke-linecap="round" />
</svg>
